<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ITIL 资产管理系统</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'Amaze/img/luffy.png' %}">
    <link rel="stylesheet" href="{% static 'plugins/bootstrap/css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'plugins/font-awesome/css/font-awesome.min.css' %}">
    <style>
        body {
            background: #f5f5f5;
            padding-top: 30px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: #337ab7;
            margin-bottom: 10px;
        }
        .header p {
            color: #999;
        }
        .panel-entry {
            transition: all 0.2s;
            height: 130px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            text-decoration: none;
            color: inherit;
        }
        .panel-entry:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.12);
            color: inherit;
        }
        .panel-entry .icon {
            font-size: 36px;
            margin-bottom: 8px;
        }
        .panel-entry .title {
            font-size: 16px;
            font-weight: 600;
        }
        .panel-entry .desc {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .section-title {
            border-left: 4px solid #337ab7;
            padding-left: 10px;
            margin: 25px 0 15px;
            font-size: 18px;
            color: #333;
        }
        .footer {
            text-align: center;
            color: #aaa;
            margin-top: 40px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fa fa-server"></i> ITIL 资产管理系统</h1>
        <p>众邦 CMDB  · 自动化资产采集与后台管理</p>
    </div>

    <div class="section-title">Stark 后台</div>
    <div class="row">
        <div class="col-md-3 col-sm-6">
            <a href="/stark/repository/server/list/" class="panel panel-primary panel-entry text-center">
                <div class="icon"><i class="fa fa-desktop"></i></div>
                <div class="title">服务器管理</div>
                <div class="desc">服务器资产列表 / 详情 / 变更记录</div>
            </a>
        </div>
        <div class="col-md-3 col-sm-6">
            <a href="/stark/repository/idc/list/" class="panel panel-info panel-entry text-center">
                <div class="icon"><i class="fa fa-building"></i></div>
                <div class="title">IDC 机房</div>
                <div class="desc">机房 / 楼层 维护</div>
            </a>
        </div>
        <div class="col-md-3 col-sm-6">
            <a href="/stark/repository/businessunit/list/" class="panel panel-success panel-entry text-center">
                <div class="icon"><i class="fa fa-sitemap"></i></div>
                <div class="title">业务线</div>
                <div class="desc">业务线与归属管理</div>
            </a>
        </div>
        <div class="col-md-3 col-sm-6">
            <a href="/stark/" class="panel panel-warning panel-entry text-center">
                <div class="icon"><i class="fa fa-cogs"></i></div>
                <div class="title">Stark 全部</div>
                <div class="desc">CRUD 组件入口</div>
            </a>
        </div>
    </div>

    <div class="section-title">Django 内置</div>
    <div class="row">
        <div class="col-md-3 col-sm-6">
            <a href="/admin/" class="panel panel-default panel-entry text-center">
                <div class="icon"><i class="fa fa-shield"></i></div>
                <div class="title">Django Admin</div>
                <div class="desc">原生管理后台</div>
            </a>
        </div>
    </div>

    <div class="section-title">API 接口</div>
    <div class="row">
        <div class="col-md-3 col-sm-6">
            <a href="/api/asset/" class="panel panel-danger panel-entry text-center">
                <div class="icon"><i class="fa fa-exchange"></i></div>
                <div class="title">/api/asset/</div>
                <div class="desc">客户端资产上报接口（POST）</div>
            </a>
        </div>
    </div>

    <div class="footer">
        ITIL CMDB · Powered by Django 1.11.29 + DRF 3.9.4
    </div>
</div>
</body>
</html>
